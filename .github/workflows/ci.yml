name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  non-maui:
    name: Non-MAUI tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: dotnet test TomeOfTongues.NonMaui.slnf --configuration Debug

  android-maui:
    name: Android MAUI build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: dotnet workload restore TomeOfTongues.Maui/TomeOfTongues.Maui.csproj
      - run: dotnet build TomeOfTongues.Maui/TomeOfTongues.Maui.csproj --configuration Debug --framework net10.0-android
